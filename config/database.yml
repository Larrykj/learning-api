default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: 127.0.0.1
  port: 5432
  username: postgres
  password: 9486

development:
  <<: *default
  database: learning_api_development

test:
  <<: *default
  database: learning_api_test

production:
  primary:
    <<: *default
    database: learning_api_production
  cache:
    <<: *default
    database: learning_api_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: learning_api_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: learning_api_production_cable
    migrations_paths: db/cable_migrate
